openapi: 3.0.0
info:
  title: Anthropic Claude API
  description: Generate patient intake summaries using Claude AI
  version: 1.0.0
servers:
  - url: https://api.anthropic.com
paths:
  /v1/messages:
    post:
      operationId: generatePatientSummary
      summary: Generate a patient intake summary
      description: Takes patient data and a template and generates a professional clinical intake summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - max_tokens
                - messages
              properties:
                model:
                  type: string
                  default: claude-haiku-4-5-20251001
                max_tokens:
                  type: integer
                  default: 2000
                system:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                      content:
                        type: string
      responses:
        "200":
          description: Successfully generated summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string